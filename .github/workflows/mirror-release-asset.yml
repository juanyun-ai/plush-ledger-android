name: Mirror Android release asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag
        required: true
        type: string
      apk_url:
        description: Public primary APK URL
        required: true
        type: string
      asset_name:
        description: GitHub release asset name
        required: true
        default: app-debug.apk
        type: string

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Download primary APK
        env:
          APK_URL: ${{ inputs.apk_url }}
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          curl --fail --location --retry 5 --retry-all-errors \
            --output "$RUNNER_TEMP/$ASSET_NAME" "$APK_URL"

      - name: Attach APK to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          gh release upload "$TAG" "$RUNNER_TEMP/$ASSET_NAME" \
            --repo "$GITHUB_REPOSITORY" --clobber
